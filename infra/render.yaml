# Render blueprint — https://render.com/docs/blueprint-spec
# One-click deploy: Fastify API (web service) + Vite frontend (static site).
#
# NOTE: Postgres is hosted on Supabase (external), so there is no `databases:`
# block here — set DATABASE_URL from the Supabase dashboard (session pooler URL).
# NOTE: Plausible (self-hosted analytics) is deployed as a separate stack
# because it requires ClickHouse; it is intentionally not part of this blueprint.
# Secrets marked `sync: false` must be filled in via the Render dashboard.

services:
  # ---------------------------------------------------------------------------
  # API — Fastify (Node)
  # ---------------------------------------------------------------------------
  - type: web
    name: syllary-api
    runtime: node
    # Pro = 2 vCPU / 4 GB — ffmpeg (Ken-Burns stitch + download transcodes) is
    # CPU-bound, so the extra core + RAM matter. Keep this in sync with the live
    # service so a blueprint re-sync can't silently downgrade it.
    plan: pro
    region: oregon
    rootDir: .
    # Render pre-installs pnpm, so use it directly. (Do NOT run `corepack enable`
    # — it fails on Render's read-only /usr/bin.)
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @syllary/api build
    # Apply DB migrations after build, before traffic switches (migrations are
    # tracked, so this is a no-op when nothing is pending).
    preDeployCommand: pnpm --filter @syllary/api db:migrate
    # Bundled output runs with plain node — no pnpm needed at runtime.
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    # Don't redeploy for docs/markdown-only pushes. Render skips only when EVERY
    # changed file matches (a mixed code+docs commit still deploys).
    buildFilter:
      ignoredPaths:
        - "docs/**"
        - "**/*.md"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: info
      # Public URL of the FRONTEND (used for CORS, canonical/share URLs).
      - key: APP_URL
        sync: false
      # Supabase session pooler URL (Project Settings -> Database -> Connection string)
      - key: DATABASE_URL
        sync: false
      # Clerk production backend key (sk_live_...)
      - key: CLERK_SECRET_KEY
        sync: false
      # Comma-separated Clerk user ids allowed into the landing-page management
      # dashboard (admin API + UI). Empty = locked down.
      - key: ADMIN_CLERK_IDS
        sync: false
      # Stable salt for anonymous IP+UA hashing — must NOT change after launch.
      - key: IP_HASH_SALT
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_YEARLY
        sync: false
      - key: STRIPE_PRICE_CREATOR_MONTHLY
        sync: false
      - key: STRIPE_PRICE_CREATOR_YEARLY
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash

  # ---------------------------------------------------------------------------
  # Web — Vite static site
  # ---------------------------------------------------------------------------
  - type: web
    name: syllary-web
    runtime: static
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @syllary/web build
    staticPublishPath: apps/web/dist
    # Don't redeploy for docs/markdown-only pushes (see API service note above).
    buildFilter:
      ignoredPaths:
        - "docs/**"
        - "**/*.md"
    # robots.txt and sitemap.xml are served as real static files in
    # apps/web/public/ (both committed). sitemap.xml is a static snapshot of the
    # API's sitemap — refresh it manually for now (Google Search Console won't
    # reliably follow a cross-host redirect, so we serve a direct 200 here).
    # SPA: every other path falls back to index.html so deep links (e.g. /p/:id
    # public pages) load on a direct hit / refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Vite vars are baked at BUILD time — set these before the static build runs.
      # Public URL of the API service (e.g. https://api.syllary.com).
      - key: VITE_API_URL
        sync: false
      # Clerk production publishable key (pk_live_...).
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
